- name: configure DB server
  hosts: db
  become: yes
  vars:
    login_host: db.daws.info
  tasks:
  - name: install mysql server
    ansible.builtin.dnf:
      name: mysql-server
      state: present

  - name: start and enable mysql server
    ansible.builtin.service:
      name: mysqld
      state: started
      enabled: yes

  - name: install python mysql dependencies
    ansible.builtin.pip:
      name: 
      - PyMySQL
      - cryptography
      executable: pip3.9 # pip3.11 if pythonversion is 3.11

# check password is already setup or not
  - name: check db connection
    community.mysql.mysql_info:
      login_user: root
      login_password: ExpenseApp@1
      login_host: "{{ login_host }}"
      filter: version
    ignore_errors: yes
    register: mysql_connections_output

  - name: print output 
    ansible.builtin.debug:
      msg: "output: {{mysql_connections_output}} "
